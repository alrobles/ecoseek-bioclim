<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="hex-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6b3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d4f2b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Hexagon -->
  <polygon points="100,10 180,55 180,145 100,190 20,145 20,55"
    fill="url(#hex-grad)" stroke="#0a3d20" stroke-width="3"/>
  <!-- Globe grid lines -->
  <ellipse cx="100" cy="100" rx="50" ry="50" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <ellipse cx="100" cy="100" rx="25" ry="50" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <ellipse cx="100" cy="100" rx="50" ry="25" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="50" y1="100" x2="150" y2="100" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="100" y1="50" x2="100" y2="150" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Temperature indicator (small thermometer) -->
  <rect x="88" y="70" width="8" height="40" rx="4" fill="rgba(255,255,255,0.9)"/>
  <circle cx="92" cy="115" r="8" fill="rgba(255,255,255,0.9)"/>
  <rect x="90" y="80" width="4" height="25" rx="2" fill="#e74c3c"/>
  <circle cx="92" cy="112" r="5" fill="#e74c3c"/>
  <!-- Raindrop -->
  <path d="M115,75 Q115,65 108,80 Q100,95 108,95 Q115,95 115,80 Z"
    fill="rgba(255,255,255,0.9)"/>
</svg>
