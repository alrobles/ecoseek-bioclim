<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="hex-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6b3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d4f2b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leaf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5cd17e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3ab85c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Hexagon badge -->
  <polygon points="100,10 178,50 178,130 100,170 22,130 22,50"
           fill="url(#hex-grad)" stroke="#0d4f2b" stroke-width="2"/>
  <!-- Magnifying glass circle -->
  <circle cx="90" cy="82" r="38" fill="none" stroke="#fff" stroke-width="5" opacity="0.9"/>
  <!-- Magnifying glass handle -->
  <line x1="118" y1="110" x2="148" y2="140" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <!-- Leaf inside magnifying glass -->
  <g transform="translate(90,78)">
    <!-- Leaf body -->
    <path d="M0,-22 C14,-18 22,-6 22,8 C22,18 14,26 0,28 C-14,26 -22,18 -22,8 C-22,-6 -14,-18 0,-22Z"
          fill="url(#leaf-grad)" opacity="0.95"/>
    <!-- Leaf vein (center) -->
    <line x1="0" y1="-18" x2="0" y2="24" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <!-- Leaf veins (left) -->
    <line x1="0" y1="-8" x2="-12" y2="-2" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="2" x2="-14" y2="10" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="12" x2="-10" y2="20" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <!-- Leaf veins (right) -->
    <line x1="0" y1="-8" x2="12" y2="-2" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="2" x2="14" y2="10" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="12" x2="10" y2="20" stroke="#fff" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
